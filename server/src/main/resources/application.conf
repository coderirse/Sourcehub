ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.sourcehub.server.ApplicationKt.module ]
    }
}

sourcehub {
    jwt {
        secret = "sourcehub-jwt-secret-change-in-production-use-env-var"
        secret = ${?JWT_SECRET}
        issuer = "sourcehub-server"
        audience = "sourcehub-app"
        accessTokenLifetimeMs = 900000  # 15 minutes
        refreshTokenLifetimeMs = 604800000  # 7 days
    }
    database {
        # "h2" for local dev, "postgresql" for cloud
        driver = "org.h2.Driver"
        driver = ${?DB_DRIVER}
        url = "jdbc:h2:file:./data/sourcehub;AUTO_SERVER=TRUE"
        url = ${?DB_URL}
        user = "sa"
        user = ${?DB_USER}
        password = ""
        password = ${?DB_PASSWORD}
    }
    upload {
        dir = "./uploads"
        dir = ${?UPLOAD_DIR}
        maxFileSizeMB = 50
    }
}
